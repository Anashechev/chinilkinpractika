{% extends 'base/base.html' %}
{% load static %}

{% block title %}Пароль изменен{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Пароль успешно изменен</h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                </div>
                
                <h5 class="mb-3">Ваш пароль был успешно изменен</h5>
                
                <p class="text-muted mb-4">
                    Теперь вы можете войти в систему, используя новый пароль.
                </p>
                
                <div class="d-grid">
                    <a href="{% url 'tickets:login' %}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Войти в систему
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
