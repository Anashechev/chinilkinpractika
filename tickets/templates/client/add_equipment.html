{% extends 'base/base.html' %}

{% block title %}Добавить технику{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Добавить новую технику</h2>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.type.id_for_label }}" class="form-label">{{ form.type.label }}</label>
                {{ form.type }}
            </div>
            
            <div class="mb-3">
                <label for="{{ form.model.id_for_label }}" class="form-label">{{ form.model.label }}</label>
                {{ form.model }}
            </div>
            
            <div class="mb-3">
                <label for="{{ form.serial_number.id_for_label }}" class="form-label">{{ form.serial_number.label }}</label>
                {{ form.serial_number }}
            </div>
            
            <div class="mb-3">
                <label for="{{ form.notes.id_for_label }}" class="form-label">{{ form.notes.label }}</label>
                {{ form.notes }}
            </div>
            
            <button type="submit" class="btn btn-primary">Добавить технику</button>
            <a href="{% url 'tickets:equipment_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
